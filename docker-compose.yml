services:
  cme-mcp:
    build: .
    ports:
      - "${CME_MCP_PORT:-3336}:8080"
    environment:
      - MCP_AUTH_TOKEN=${CME_MCP_AUTH_TOKEN:-}
      - WORKSPACES_ROOT=/workspaces
      # HTTPS — décommenter et fournir les fichiers dans ./certs/
      #- MCP_SSL_CERTFILE=/certs/server.crt
      #- MCP_SSL_KEYFILE=/certs/server.key
    volumes:
      # État runtime : credentials, manifest, lock, exports
      - ./data:/data
      - ${WORKSPACES_ROOT:?Set WORKSPACES_ROOT to the directory containing all workspaces}:/workspaces
      # Certificats HTTPS — décommenter si MCP_SSL_CERTFILE est renseigné
      #- ./certs:/certs:ro
    restart: unless-stopped

  # CLI one-shot pour configurer CME directement (profil cli).
  # Exemples :
  #   CME_WORKSPACE=juno docker compose run --rm cme-cli configure
  #   CME_WORKSPACE=juno docker compose run --rm cme-cli export
  cme-cli:
    build: .
    profiles: [cli]
    entrypoint: cme
    environment:
      - CME_CONFIG_PATH=/data/${CME_WORKSPACE:-__set_CME_WORKSPACE__}/cme/app_data.json
      - WORKSPACES_ROOT=/workspaces
    volumes:
      - ./data:/data
      - ${WORKSPACES_ROOT:?Set WORKSPACES_ROOT to the directory containing all workspaces}:/workspaces
